[display]
; Monitor to display on (0 = primary). Available monitors and their indices are
; logged at INFO level on startup — check the log to find the right value.
monitor = 0
; Initial window size — use plain pixels ("1280"), "1280px", or a % of the monitor ("30%")
; (ignored when fullscreen = true)
width = 4000
height = 2000
; Set to true to start in fullscreen mode (F key toggles at runtime)
; fullscreen = false
; Internal render buffer size — defaults to width x height above.
; Set smaller for a retro low-res look (palette renderer upscales to fill the window).
; Supports plain pixels ("320"), "320px", or a % of the initial window size ("25%").
; Note: in-buffer quote text position is relative to the render buffer, not the window.
; render_width = 25%
; render_height = 25%
; Target frame rate in Hz — 0 (or omit) for unlimited (max throughput).
; Setting this caps the render loop so the GPU isn't pegged at 100%, which
; keeps frame pacing smoother on slower hardware. Try 60 for a stable display.
target_fps = 50

[keys]
; Key bindings — map a key combination to a node path in the parameter tree.
; Format:  KEY = Node Path/Child Name
;          MODIFIER+KEY = Node Path
; KEY is a GLFW-derived name: single letter (F, I, X …) or named key
; (PRINT_SCREEN, RIGHT_BRACKET, LEFT_BRACKET, COMMA, PERIOD …).
; Modifiers: SHIFT, CTRL, ALT, SUPER.  Multiple modifiers: SHIFT+CTRL+K.
;
; App
ESCAPE          = General/Quit
;
; Display
F               = General/Toggle Fullscreen
PRINT_SCREEN    = General/Screenshot
SHIFT+PRINT_SCREEN = General/Record 5s
P               = Render/Palette/Random
I               = General/Flash Image
X               = General/Flash White
Q               = General/Show Quote
D               = General/Toggle Debug
N               = General/Toggle Notifications
B               = General/Toggle Quote Mode
A               = General/Cycle Audio
;
; Blur
COMMA           = Render/Blur/Fade -
PERIOD          = Render/Blur/Fade +
SHIFT+COMMA     = Render/Blur/Kernel -
SHIFT+PERIOD    = Render/Blur/Kernel +
;
; Translation
T               = Tab/Translate Source/Randomise
SHIFT+T         = Tab/Translate Source/New Source
RIGHT_BRACKET   = Tab/Translate Source/Next
LEFT_BRACKET    = Tab/Translate Source/Previous
SHIFT+S         = Tab/Translate Source/Save
;
; Remote
R               = General/Remote/Rotate Token
;
; Test
Z               = General/Test Work

[Quotes]
; One or more JSON quote files to load (repeat the key to add more sources).
; Each file must be a JSON array of {"quote": "...", "author": "..."} objects.
; Quotes may contain \n for multi-line display.
files = quotes.json
; files = extra_quotes.json
; Font sizes: plain pixels ("36"), "36px", or "5%" of window height (capped at 120px).
quote_font  = Noto Serif Display
quote_size  = 10%
quote_style = ITALIC
attr_font   = Noto Serif Display
attr_size   = 5%
attr_font =
attr_align = right

[Notifications]
; Notification overlay appearance.
; font:     Java logical font name (Monospaced, SansSerif, Serif …) or installed font name
; size:     plain pixels ("18"), "18px", or "2%" of window height (capped at 120px)
; style:    PLAIN | BOLD | ITALIC | BOLD_ITALIC
; color:    StandardColors name (WHITE, YELLOW, RED, GREEN, CYAN …) or hex (#RRGGBB / #RRGGBBAA)
; location: corner to anchor the message — TOP_LEFT | TOP_RIGHT | BOTTOM_LEFT | BOTTOM_RIGHT
; padding:  gap from edge — plain pixels ("20"), "20px", or "1%" of window height
; duration: how many seconds each notification stays on screen
; font     = Monospaced
size     = 8%
; style    = BOLD
; color    = YELLOW
; location = TOP_LEFT
; padding  = 1%
; duration = 3

[Work]
; Background work spinner and status label appearance.
; font:     Java logical font name (Monospaced, SansSerif, Serif …) or installed font name
; size:     plain pixels ("18"), "18px", or "2%" of window height (capped at 120px)
; style:    PLAIN | BOLD | ITALIC | BOLD_ITALIC
; color:    StandardColors name (WHITE, YELLOW, RED, GREEN, CYAN …) or hex (#RRGGBB / #RRGGBBAA)
; location: corner to anchor the spinner — TOP_LEFT | TOP_RIGHT | BOTTOM_LEFT | BOTTOM_RIGHT
; padding:  gap from edge — plain pixels ("20"), "20px", or "1%" of window height
; rpm:      spinner rotation speed in revolutions per minute
; font     = Monospaced
size     = 8%
; style    = BOLD
; color    = CYAN
; location = BOTTOM_LEFT
; padding  = 1%
; rpm      = 60

[remote]
; Remote control server settings

; Set to false to disable remote control server
enabled = true
; Our port based on Amiga
port = 8363
; Network interface whose IP is used in the QR URL. Use `ip addr` to find your interface name.
; Setting this trusts the named interface even if the OS marks it virtual (e.g. USB ethernet adapters).
network_interface = wlp59s0
; Logo size as % of QR area (0 = no logo, 30 = max). ECC is chosen automatically.
qr_logo_size = 0
